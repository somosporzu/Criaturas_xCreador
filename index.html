    const getTraitDisplayInfo = (trait) => {
      let displayName = trait.name;
      let displayDescription = trait.description;
      if (trait.appliedData?.damageType) {
        displayName = `${trait.name}: ${trait.appliedData.damageType}`;
        displayDescription = displayDescription.replace('un tipo de daño', trait.appliedData.damageType);
      } else if (trait.appliedData?.attribute) {
        const attrName = trait.appliedData.attribute.charAt(0).toUpperCase() + trait.appliedData.attribute.slice(1);
        if (trait.name === 'Mejora de Atributo') { displayName = `${trait.name} (${attrName})`; displayDescription = `Aumenta ${attrName} en +1.`; }
        else if (trait.name === 'Deficiencia de Atributo') { displayName = `Deficiencia de Atributo (${attrName})`; displayDescription = `Reduce ${attrName} en -1.`; }
      } else if (trait.appliedData?.concepto) {
        displayName = `${trait.name} (${trait.appliedData.concepto})`;
        displayDescription = displayDescription.replace('un nuevo Concepto de la lista general', `el concepto de ${trait.appliedData.concepto}`);
      } else if (trait.appliedData?.nature) {
        displayName = `${trait.name} (${trait.appliedData.nature})`;
        displayDescription = displayDescription.replace('una nueva Naturaleza de la lista general', `la naturaleza ${trait.appliedData.nature}`);
      } else if (trait.appliedData?.movementType) {
        displayName = `${trait.name} (${trait.appliedData.movementType})`;
        displayDescription = displayDescription.replace('Nadar, Trepar o Excavar', trait.appliedData.movementType);

        else if (trait.name === 'Inmunidad a estado') { displayDescription = `La criatura es inmune al estado ${trait.appliedData.statusEffect}.`; }
      }
      return { displayName, displayDescription };

                ))}

            </div>
            <div className="mt-6 flex justify-end gap-3">
              <button onClick={onClose} className="px-5 py-2 bg-stone-600 hover:bg-stone-500 text-stone-100 font-semibold rounded-lg transition-colors text-sm">Cancelar</button>
              <button onClick={() => onConfirm(options)} className="px-5 py-2 bg-lime-700 hover:bg-lime-600 text-stone-100 font-semibold rounded-lg transition-colors text-sm">Copiar Texto</button>
            </div>
          </div>
        </div>
      );
    };

    // ============================================================
    // STEP NAVIGATOR
    // ============================================================
    const steps = [
      { number: 1, title: 'Concepto' }, { number: 2, title: 'Atributos' },
      { number: 3, title: 'Rasgos' }, { number: 4, title: 'Equipo' },
      { number: 5, title: 'Acciones' }, { number: 6, title: 'Ficha Final' }
    ];
    const StepNavigator = ({ currentStep, onStepClick }) => {
      const pct = ((currentStep - 1) / (steps.length - 1)) * 100;
      return (
        <div className="w-full px-2 mb-10">
          <div className="relative">
            <div className="absolute top-5 left-0 w-full h-0.5 bg-stone-700 -translate-y-1/2"></div>
            <div className="absolute top-5 left-0 h-0.5 bg-amber-600 -translate-y-1/2 transition-all duration-500" style={{width:`${pct}%`}}></div>
            <ol className="relative flex justify-between items-start">
              {steps.map(step => {
                const isCompleted = currentStep > step.number;
                const isCurrent = currentStep === step.number;
                return (
                  <li key={step.number}>
                    <button onClick={() => onStepClick(step.number)}
                      className="flex flex-col items-center group focus:outline-none">
                      <span className={`flex items-center justify-center rounded-full font-bold border-2 transition-all duration-300 ${
                        isCurrent ? 'w-11 h-11 bg-amber-500 border-amber-400 text-white shadow-lg shadow-amber-900/50 scale-110 text-base' :
                        isCompleted ? 'w-9 h-9 bg-amber-700 border-amber-600 text-white text-sm' :
                        'w-9 h-9 bg-stone-800 border-stone-600 text-stone-400 group-hover:border-amber-500 text-sm'}`}>
                        {isCompleted ? '✓' : step.number}
                      </span>
                      <span className={`mt-2 text-xs font-semibold text-center w-16 transition-colors ${isCurrent ? 'text-amber-400' : 'text-stone-500 group-hover:text-amber-500'}`}>
                        {step.title}
                      </span>
                    </button>
                  </li>
                );
              })}
            </ol>
          </div>
        </div>
      );
    };

    // ============================================================
    // SAVE/LOAD MANAGER
    // ============================================================
    const SaveLoadManager = ({ creature, savedCreatures, onSave, onLoad, onDelete, onNew }) => {
      const [isOpen, setIsOpen] = useState(false);
      const dropdownRef = useRef(null);
      useEffect(() => {
        const handler = (e) => { if (dropdownRef.current && !dropdownRef.current.contains(e.target)) setIsOpen(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);
      return (
        <div className="flex items-center gap-2">
          <button onClick={onNew} className="px-4 py-2 bg-emerald-800 hover:bg-emerald-700 text-stone-100 font-semibold rounded-lg shadow transition-colors text-sm">Nueva</button>
          <div className="relative" ref={dropdownRef}>
            <button onClick={() => setIsOpen(p => !p)} className="px-4 py-2 bg-sky-800 hover:bg-sky-700 text-stone-100 font-semibold rounded-lg shadow transition-colors text-sm">
              Guardar / Cargar
            </button>
            {isOpen && (
              <div className="absolute right-0 mt-2 w-72 bg-stone-800 border border-stone-600 rounded-lg shadow-2xl z-50 animate-fade-in-fast">
                <div className="p-3 border-b border-stone-700">
                  <button onClick={() => { onSave(); setIsOpen(false); }}
                    className="w-full px-4 py-2 bg-amber-700 hover:bg-amber-600 text-stone-100 font-semibold rounded-md transition-colors text-sm">
                    {creature.id ? 'Actualizar Criatura' : 'Guardar Criatura'}
                  </button>
                </div>
                <div className="p-3">
                  <h4 className="text-stone-300 font-semibold mb-2 text-sm">Criaturas Guardadas</h4>
                  <ul className="space-y-2 max-h-60 overflow-y-auto">
                    {savedCreatures.length === 0 ? (
                      <li className="text-stone-500 text-xs italic text-center py-2">No hay criaturas guardadas.</li>
                    ) : savedCreatures.map(c => (
                      <li key={c.id} className="bg-stone-700 p-2 rounded-md text-xs group">
                        <div className="flex justify-between items-center">
                          <span className="text-stone-200 font-medium truncate pr-2">{c.name} <span className="text-stone-400">(ND {c.nd})</span></span>
                          <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onClick={() => { onLoad(c.id); setIsOpen(false); }} className="px-2 py-1 bg-lime-700 hover:bg-lime-600 rounded text-white">Cargar</button>
                            <button onClick={() => onDelete(c.id)} className="px-2 py-1 bg-red-800 hover:bg-red-700 rounded text-white">✕</button>
                          </div>
                        </div>
                      </li>
                    ))}
                  </ul>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    // ============================================================
    // ATTRIBUTE EDITOR
    // ============================================================
    const AttributeEditor = ({ creature, onAttributeChange, onReset }) => {
      const AttributeControl = ({ label, value, attr }) => (
        <div className="flex items-center justify-between bg-stone-900 p-4 rounded-lg border border-stone-700">
          <span className="text-lg font-semibold text-stone-300 font-display tracking-wide">{label}</span>
          <div className="flex items-center gap-4">
            <button onClick={() => onAttributeChange(attr, -1)} disabled={value <= -3}
              className="w-9 h-9 rounded-full bg-stone-700 hover:bg-stone-600 text-xl font-bold transition-colors disabled:opacity-30 disabled:cursor-not-allowed">−</button>
            <span className="text-2xl font-bold text-amber-400 w-12 text-center font-mono">{value >= 0 ? `+${value}` : value}</span>
            <button onClick={() => onAttributeChange(attr, 1)}
              className="w-9 h-9 rounded-full bg-stone-700 hover:bg-stone-600 text-xl font-bold transition-colors">+</button>
          </div>
        </div>
      );
      return (
        <div className="max-w-md mx-auto space-y-5">
          <div className="bg-stone-900/70 p-4 rounded-lg border border-stone-700 text-center text-sm text-stone-400">
            Aumentar un atributo cuesta <span className="text-amber-400 font-bold">2 PR</span>. Reducirlo otorga <span className="text-lime-400 font-bold">1 PR</span>. Mínimo <span className="text-red-400">−3</span>.
          </div>
          <AttributeControl label="Cuerpo" value={creature.attributes.cuerpo} attr="cuerpo" />
          <AttributeControl label="Destreza" value={creature.attributes.destreza} attr="destreza" />
          <AttributeControl label="Aura" value={creature.attributes.aura} attr="aura" />
          <button onClick={onReset} className="w-full py-2 px-4 bg-stone-700 hover:bg-stone-600 text-stone-100 font-semibold rounded-lg transition-colors text-sm">
            Restablecer Atributos y Rasgos
          </button>
        </div>
      );
    };

    // ============================================================
    // TRAIT SELECTOR
    // ============================================================
    const TraitCard = ({ trait, onAdd, disabled }) => {
      const cost = typeof trait.cost === 'number' ? `${trait.cost} PR` : `+${trait.cost.split(' ')[1]} PR`;
      const costColor = typeof trait.cost === 'number' ? 'text-amber-400' : 'text-lime-400';
      return (
        <div className="bg-stone-900/60 p-3 rounded-lg border border-stone-700/50 flex flex-col justify-between hover:border-stone-600 transition-colors">
          <div>
            <div className="flex justify-between items-start mb-1">
              <h4 className="font-bold text-stone-100 text-sm leading-tight pr-2">{trait.name}</h4>
              <span className={`text-xs font-mono font-bold flex-shrink-0 ${costColor}`}>{cost}</span>
            </div>
            {trait.restriction && <p className="text-xs text-red-400 italic mb-1">Solo: {trait.restriction}</p>}
            <p className="text-xs text-stone-400 leading-relaxed">{trait.description}</p>
          </div>
          <button onClick={onAdd} disabled={disabled}
            className="mt-3 w-full bg-amber-800 hover:bg-amber-700 text-white font-semibold py-1.5 px-3 rounded-md text-xs disabled:bg-stone-700 disabled:text-stone-500 disabled:cursor-not-allowed transition-colors">
            Añadir
          </button>
        </div>
      );
    };

    const TraitSelector = ({ creature, addTrait, removeTrait }) => {
      const [openCategory, setOpenCategory] = useState(null);
      const [modalState, setModalState] = useState({ type: null, trait: null });
      const basePr = useMemo(() => ND_MAP[creature.nd].pr, [creature.nd]);
      const { prSpent, prGained } = useMemo(() => creature.traits.reduce((acc, t) => {
        if (typeof t.cost === 'number') acc.prSpent += t.cost;
        else if (typeof t.cost === 'string' && t.cost.startsWith('Gana')) acc.prGained += parseInt(t.cost.split(' ')[1], 10);
        return acc;
      }, { prSpent: 0, prGained: 0 }), [creature.traits]);
      const prBudget = basePr + prGained;
      const prRemaining = prBudget - prSpent;

      const groupedTraits = useMemo(() => {
        return ALL_TRAITS.filter(t => t.name !== 'Mejora de Atributo' && t.name !== 'Deficiencia de Atributo')
          .reduce((acc, trait) => { if (!acc[trait.category]) acc[trait.category] = []; acc[trait.category].push(trait); return acc; }, {});
      }, []);

      const handleAddTraitClick = (trait) => {
        if (['Vulnerable','Resistente','Inmune','Absorción de Daño'].includes(trait.name)) setModalState({ type: 'damage', trait });
        else if (['Inmunidad a estado','Estado añadido'].includes(trait.name)) setModalState({ type: 'status', trait });
        else if (trait.name === 'Versatilidad Conceptual') setModalState({ type: 'concept', trait });
        else if (trait.name === 'Versatilidad de Carácter') setModalState({ type: 'nature', trait });
        else if (trait.name === 'Movimiento Especial') setModalState({ type: 'movement', trait });
        else addTrait(trait);
      };

      const confirmModal = (selected) => {
        const { type, trait } = modalState;
        let appliedData = {};
        if (type === 'damage') appliedData = { damageType: selected };
        else if (type === 'status') appliedData = { statusEffect: selected };
        else if (type === 'concept') appliedData = { concepto: selected };
        else if (type === 'nature') appliedData = { nature: selected };
        else if (type === 'movement') appliedData = { movementType: selected };
        addTrait({ ...trait, appliedData });
        setModalState({ type: null, trait: null });
      };

      const modalOptions = {
        damage: { title: 'Tipo de Daño', options: DAMAGE_TYPES },
        status: { title: 'Estado Alterado', options: STATUS_EFFECTS },
        concept: { title: 'Concepto', options: ALL_CONCEPTS },
        nature: { title: 'Naturaleza', options: NATURES },
        movement: { title: 'Tipo de Movimiento', options: MOVEMENT_TYPES },
      };

      const currentModal = modalState.type ? modalOptions[modalState.type] : null;

      return (
        <>
          {currentModal && (
            <SelectModal
              isOpen={!!modalState.type}
              title={`Seleccionar ${currentModal.title} para "${modalState.trait?.name}"`}
              options={currentModal.options}
              onClose={() => setModalState({ type: null, trait: null })}
              onConfirm={confirmModal}
            />
          )}
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div className="lg:col-span-2 space-y-2">
              {Object.entries(groupedTraits).map(([category, traits]) => {
                const isOpen = openCategory === category;
                return (
                  <div key={category} className="border border-stone-700 rounded-lg overflow-hidden">
                    <button onClick={() => setOpenCategory(isOpen ? null : category)}
                      className="w-full flex justify-between items-center p-4 bg-stone-800 hover:bg-stone-750 transition-colors">
                      <h4 className="text-base font-semibold text-amber-500 font-display">{category}</h4>
                      <span className={`text-stone-400 transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`}>▼</span>
                    </button>
                    {isOpen && (
                      <div className="p-4 border-t border-stone-700/50 bg-stone-800/50 animate-fade-in">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                          {traits.map(trait => (
                            <TraitCard key={trait.name} trait={trait} onAdd={() => handleAddTraitClick(trait)}
                              disabled={typeof trait.cost === 'number' && prRemaining < trait.cost} />
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
            <div className="lg:col-span-1">
              <div className="sticky top-4 space-y-4">
                <div className="bg-stone-900 p-4 rounded-lg border border-stone-700">
                  <h3 className="text-lg font-bold text-stone-100 mb-3 text-center font-display">Presupuesto</h3>
                  <div className="flex justify-between items-center bg-stone-800 p-3 rounded-md mb-1">
                    <span className="text-stone-300 text-sm font-semibold">Puntos de Rasgo</span>
                    <span className="text-2xl font-bold text-amber-400 font-mono">{prRemaining}<span className="text-sm text-stone-400">/{prBudget}</span></span>
                  </div>
                  <p className="text-xs text-stone-500 text-center">Base: {basePr} · Ganados: {prGained} · Gastados: {prSpent}</p>
                </div>
                <div className="bg-stone-900 p-4 rounded-lg border border-stone-700">
                  <h3 className="text-lg font-bold text-stone-100 mb-3 font-display">Rasgos Seleccionados</h3>
                  <div className="space-y-1.5 max-h-80 overflow-y-auto">
                    {creature.traits.length === 0 ? (
                      <p className="text-stone-500 italic text-sm">Ningún rasgo añadido.</p>
                    ) : creature.traits.map(trait => {
                      const isAttr = trait.name === 'Mejora de Atributo' || trait.name === 'Deficiencia de Atributo';
                      const isCat = trait.isCategoryAbility;
                      let displayName = trait.name;
                      if (trait.appliedData?.damageType) displayName = `${trait.name} (${trait.appliedData.damageType})`;
                      else if (trait.appliedData?.attribute) displayName = `${trait.name} (${trait.appliedData.attribute})`;
                      else if (trait.appliedData?.concepto) displayName = `${trait.name} (${trait.appliedData.concepto})`;
                      else if (trait.appliedData?.nature) displayName = `${trait.name} (${trait.appliedData.nature})`;
                      else if (trait.appliedData?.movementType) displayName = `${trait.name} (${trait.appliedData.movementType})`;
                      else if (trait.appliedData?.statusEffect) displayName = `${trait.name} (${trait.appliedData.statusEffect})`;
                      return (
                        <div key={trait.instanceId} className={`flex justify-between items-center p-2 rounded text-xs ${isCat ? 'bg-amber-900/30 border border-amber-800/40' : 'bg-stone-800'}`}>
                          <span className="text-stone-300 truncate pr-2 flex-1">{displayName}{isCat && <span className="text-amber-600 ml-1">(categoría)</span>}</span>
                          <button onClick={() => removeTrait(trait.instanceId)} disabled={isAttr || isCat}
                            className="text-red-600 hover:text-red-400 font-bold disabled:text-stone-700 disabled:cursor-not-allowed">✕</button>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </>
      );
    };

    // ============================================================
    // EQUIPMENT SELECTOR
    // ============================================================
    const bonusOptions = [-3,-2,-1,0,1,2,3,4,5];
    const EquipmentSelector = ({ creature, onAddWeapon, onRemoveWeapon, onWeaponBonusChange, onArmorShieldChange, onEquipmentBonusChange }) => {
      const [selectedWeapon, setSelectedWeapon] = useState(ALL_WEAPONS[0].name);
      const getNameWithBonus = (item, type) => {
        const b = item.bonus;
        return b === 0 ? item[type].name : `${item[type].name} ${b > 0 ? '+' : ''}${b}`;
      };
      return (
        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div>
            <h3 className="text-lg font-semibold text-stone-100 mb-3 font-display">Armas Equipadas</h3>
            <div className="space-y-2 mb-3 p-2 bg-stone-900/50 rounded-lg border border-stone-700 min-h-20 max-h-56 overflow-y-auto">
              {creature.equippedWeapons.length > 0 ? creature.equippedWeapons.map((ew, i) => (
                <div key={i} className="bg-stone-800 p-2 rounded">
                  <div className="flex justify-between items-start">
                    <div><p className="text-sm text-stone-200 font-semibold">{getNameWithBonus(ew, 'weapon')}</p><p className="text-xs text-stone-400">{ew.weapon.damage} {ew.weapon.damageType}</p></div>
                    <button onClick={() => onRemoveWeapon(i)} className="text-red-600 hover:text-red-400 font-bold">✕</button>
                  </div>
                  <div className="mt-1">
                    <label className="text-xs text-stone-400 mr-2">Bono:</label>
                    <select value={ew.bonus} onChange={e => onWeaponBonusChange(i, parseInt(e.target.value))}
                      className="bg-stone-700 border border-stone-600 rounded py-0.5 px-1.5 text-stone-100 text-xs">
                      {bonusOptions.map(b => <option key={b} value={b}>{b >= 0 ? `+${b}` : b}</option>)}
                    </select>
                  </div>
                </div>
              )) : <p className="text-stone-500 text-sm italic text-center pt-3">Ninguna equipada.</p>}
            </div>
            <select value={selectedWeapon} onChange={e => setSelectedWeapon(e.target.value)}
              className="w-full bg-stone-700 border border-stone-600 rounded-md py-2 px-3 text-stone-100 text-sm mb-2">
              {ALL_WEAPONS.map(w => <option key={w.name} value={w.name}>{w.name}</option>)}
            </select>
            <button onClick={() => onAddWeapon(selectedWeapon)}
              className="w-full py-2 bg-amber-700 hover:bg-amber-600 text-stone-100 font-semibold rounded-lg text-sm transition-colors">Añadir Arma</button>
          </div>
          {[['armor','Armadura',ALL_ARMORS],['shield','Escudo',ALL_SHIELDS]].map(([type, label, items]) => (
            <div key={type}>
              <h3 className="text-lg font-semibold text-stone-100 mb-3 font-display">{label}</h3>
              <select value={creature[type === 'armor' ? 'equippedArmor' : 'equippedShield']?.[type]?.name || 'Ninguno'}
                onChange={e => onArmorShieldChange(type, e.target.value)}
                className="w-full bg-stone-700 border border-stone-600 rounded-md py-2 px-3 text-stone-100 text-sm mb-2">
                <option value="Ninguno">Ninguno</option>
                {items.map(a => <option key={a.name} value={a.name} disabled={creature.attributes.cuerpo < a.cuerpoRequirement}>{a.name}{creature.attributes.cuerpo < a.cuerpoRequirement ? ` (Req. Cuerpo +${a.cuerpoRequirement})` : ''}</option>)}
              </select>
              {creature[type === 'armor' ? 'equippedArmor' : 'equippedShield'] && (() => {
                const equipped = creature[type === 'armor' ? 'equippedArmor' : 'equippedShield'];
                const item = equipped[type];
                return (
                  <div className="p-3 bg-stone-900/50 rounded-lg border border-stone-700 text-xs space-y-1.5">
                    <div><label className="text-stone-400 mr-2">Bono:</label>
                      <select value={equipped.bonus} onChange={e => onEquipmentBonusChange(type, parseInt(e.target.value))}
                        className="bg-stone-700 border border-stone-600 rounded py-0.5 px-1.5 text-stone-100 text-xs">
                        {bonusOptions.map(b => <option key={b} value={b}>{b >= 0 ? `+${b}` : b}</option>)}
                      </select>
                    </div>
                    <p><span className="text-stone-400">Bono Base: </span>+{item.defenseBonus}</p>
                    <p><span className="text-stone-400">Req. Cuerpo: </span>+{item.cuerpoRequirement}</p>
                  </div>
                );
              })()}
            </div>
          ))}
        </div>
      );
    };

    // ============================================================
    // ACTION EDITOR
    // ============================================================
    const ActionEditor = ({ creature, addAttack, removeAttack, reorderAttacks }) => {
      const getDefaultAttack = useCallback(() => {
        const base = ND_MAP[creature.nd];
        const diceMatch = base.danoBase.match(/(\d+d\d+)/);
        const modMatch = base.danoBase.match(/([+-])\s*(\d+)/);
        return {
          name: 'Ataque Básico', type: 'Melee', attribute: 'cuerpo',
          damageDice: diceMatch ? diceMatch[0] : '1d6',
          damageModifier: modMatch ? (modMatch[1] === '+' ? parseInt(modMatch[2]) : -parseInt(modMatch[2])).toString() : '0',
          damageType: 'Contundente', description: '', range: ''
        };
      }, [creature.nd]);

      const [newAttack, setNewAttack] = useState(getDefaultAttack);
      useEffect(() => { setNewAttack(getDefaultAttack()); }, [creature.nd, getDefaultAttack]);
      const dragIndex = useRef(null);
      const [dragOver, setDragOver] = useState(null);

      const attributeBonus = creature.attributes[newAttack.attribute] || 0;
      const totalMod = attributeBonus + (parseInt(newAttack.damageModifier) || 0);
      const modStr = totalMod === 0 ? '' : totalMod > 0 ? ` + ${totalMod}` : ` - ${Math.abs(totalMod)}`;

      const handleAdd = () => {
        addAttack({
          name: newAttack.name, type: newAttack.type, attribute: newAttack.attribute,
          damageDice: newAttack.damageDice, damageModifier: parseInt(newAttack.damageModifier) || 0,
          damageType: newAttack.damageType, description: newAttack.description,
          ...(newAttack.type === 'Ranged' && newAttack.range ? { range: newAttack.range } : {})
        });
        setNewAttack(getDefaultAttack());
      };

      const inputCls = "w-full bg-stone-700 border border-stone-600 rounded-md py-2 px-3 text-stone-100 text-sm focus:outline-none focus:ring-2 focus:ring-amber-600";
      const labelCls = "block text-sm font-medium text-stone-300 mb-1";

      return (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div className="space-y-4">
            <h3 className="text-lg font-semibold text-stone-100 font-display">Nuevo Ataque</h3>
            <div><label className={labelCls}>Nombre</label><input type="text" value={newAttack.name} onChange={e => setNewAttack(p=>({...p,name:e.target.value}))} className={inputCls}/></div>
            <div className="grid grid-cols-2 gap-3">
              <div><label className={labelCls}>Tipo</label>
                <select value={newAttack.type} onChange={e => setNewAttack(p=>({...p,type:e.target.value}))} className={inputCls}>
                  <option value="Melee">Melee</option><option value="Ranged">Ranged</option>
                </select>
              </div>
              <div><label className={labelCls}>Atributo</label>
                <select value={newAttack.attribute} onChange={e => setNewAttack(p=>({...p,attribute:e.target.value}))} className={inputCls}>
                  <option value="cuerpo">Cuerpo</option><option value="destreza">Destreza</option>
                </select>
              </div>
            </div>
            {newAttack.type === 'Ranged' && <div><label className={labelCls}>Rango</label><input type="text" value={newAttack.range} onChange={e => setNewAttack(p=>({...p,range:e.target.value}))} placeholder="ej. 15/30m" className={inputCls}/></div>}
            <div className="grid grid-cols-2 gap-3">
              <div><label className={labelCls}>Dados</label><input type="text" value={newAttack.damageDice} onChange={e => setNewAttack(p=>({...p,damageDice:e.target.value}))} className={inputCls}/></div>
              <div><label className={labelCls}>Daño Extra</label><input type="number" value={newAttack.damageModifier} onChange={e => setNewAttack(p=>({...p,damageModifier:e.target.value}))} className={inputCls}/></div>
            </div>
            <div><label className={labelCls}>Tipo de Daño</label>
              <select value={newAttack.damageType} onChange={e => setNewAttack(p=>({...p,damageType:e.target.value}))} className={inputCls}>
                {DAMAGE_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>
            <div><label className={labelCls}>Descripción / Efectos</label>
              <textarea value={newAttack.description} onChange={e => setNewAttack(p=>({...p,description:e.target.value}))} rows={2} className={inputCls}/>
            </div>
            <div className="bg-stone-900/60 p-3 rounded-lg border border-stone-700 text-sm">
              <p className="text-amber-400 font-bold text-center mb-2">Vista Previa</p>
              <div className="flex justify-between"><span className="text-stone-400">Bono Ataque:</span><span className="font-mono font-bold text-stone-100">{attributeBonus >= 0 ? '+' : ''}{attributeBonus}</span></div>
              <div className="flex justify-between"><span className="text-stone-400">Daño Final:</span><span className="font-mono font-bold text-stone-100">{newAttack.damageDice}{modStr} {newAttack.damageType}</span></div>
            </div>
            <button onClick={handleAdd} className="w-full py-2 bg-amber-700 hover:bg-amber-600 text-stone-100 font-semibold rounded-lg transition-colors">Añadir Ataque</button>
          </div>
          <div>
            <h3 className="text-lg font-semibold text-stone-100 mb-3 font-display">Lista de Acciones</h3>
            <div className="space-y-2 max-h-96 overflow-y-auto">
              {creature.attacks.length === 0 ? <p className="text-stone-500 italic text-center pt-6">Sin ataques añadidos.</p> :
                creature.attacks.map((attack, i) => {
                  const bonus = creature.attributes[attack.attribute] || 0;
                  const mod = bonus + attack.damageModifier;
                  const ms = mod === 0 ? '' : mod > 0 ? ` + ${mod}` : ` - ${Math.abs(mod)}`;
                  return (
                    <div key={i} draggable
                      onDragStart={() => { dragIndex.current = i; }}
                      onDragEnter={() => { if (dragIndex.current !== null && dragIndex.current !== i) setDragOver(i); }}
                      onDragOver={e => e.preventDefault()}
                      onDragEnd={() => { dragIndex.current = null; setDragOver(null); }}
                      onDrop={() => { if (dragIndex.current !== null && dragIndex.current !== i) reorderAttacks(dragIndex.current, i); setDragOver(null); }}
                      className={`bg-stone-900/70 p-3 rounded-lg border relative flex gap-2 items-center transition-all cursor-grab ${dragOver === i ? 'border-amber-500 scale-102 shadow-lg' : 'border-stone-700'}`}>
                      <span className="text-stone-500 text-lg">⠿</span>
                      <div className="flex-grow pr-6">
                        <p className="text-stone-100 font-bold text-sm">{attack.name} <span className="text-xs font-normal text-stone-400">({attack.type})</span></p>
                        <p className="text-xs text-stone-300 font-mono">Ataque: {bonus >= 0 ? '+' : ''}{bonus} · Daño: {attack.damageDice}{ms} {attack.damageType}</p>
                        {attack.description && <p className="text-xs text-stone-400 italic mt-0.5">{attack.description}</p>}
                      </div>
                      <button onClick={() => removeAttack(i)} className="absolute top-2 right-2 text-red-600 hover:text-red-400 font-bold">✕</button>
                    </div>
                  );
                })}
            </div>
          </div>
        </div>
      );
    };

    // ============================================================
    // CREATURE SHEET
    // ============================================================
    const TraitItem = ({ trait, count }) => {
      const { displayName, displayDescription } = getTraitDisplayInfo(trait);
      let finalName = displayName;
      if (count > 1) {
        const m = displayName.match(/\(([^)]+)\)/);
        finalName = m ? displayName.replace(m[0], `(${m[1]} x${count})`) : `${displayName} (x${count})`;
      }
      return <li className="py-0.5"><span className="font-semibold text-amber-400">{finalName}.</span>{' '}<span className="text-stone-300">{displayDescription}</span></li>;
    };

    const CreatureSheet = ({ creature }) => {
      const [copyText, setCopyText] = useState('Exportar Texto');
      const [imgText, setImgText] = useState('Exportar Imagen');
      const [exportOpen, setExportOpen] = useState(false);
      const sheetRef = useRef(null);

      const baseStats = useMemo(() => ND_MAP[creature.nd], [creature.nd]);
      const sizeMods = useMemo(() => SIZE_MAP[creature.size], [creature.size]);
      const categoryTrait = useMemo(() => creature.traits.find(t => t.isCategoryAbility), [creature.traits]);
      const concepts = useMemo(() => creature.traits.filter(t => t.name === 'Versatilidad Conceptual' && t.appliedData?.concepto).map(t => t.appliedData.concepto), [creature.traits]);
      const allNatures = useMemo(() => {
        const extra = creature.traits.filter(t => t.name === 'Versatilidad de Carácter' && t.appliedData?.nature).map(t => t.appliedData.nature);
        return [...creature.natures, ...extra];
      }, [creature.natures, creature.traits]);
      const fullCategory = useMemo(() => {
        const parts = [creature.category, ...concepts].join(' ');
        return creature.label ? `${parts} (${creature.label})` : parts;
      }, [creature.category, concepts, creature.label]);
      const finalResistencia = useMemo(() => Math.max(4, baseStats.resistencia + sizeMods.modResistencia + creature.traits.filter(t => t.name === 'Vitalidad Aumentada').length * 10), [baseStats, sizeMods, creature.traits]);
      const finalDefensa = useMemo(() => baseStats.defensa + sizeMods.modDefensa + creature.traits.filter(t => t.name === 'Armadura Natural').length + (creature.equippedArmor?.armor.defenseBonus || 0) + (creature.equippedArmor?.bonus || 0) + (creature.equippedShield?.shield.defenseBonus || 0) + (creature.equippedShield?.bonus || 0), [baseStats, sizeMods, creature.traits, creature.equippedArmor, creature.equippedShield]);
      const finalIniciativa = useMemo(() => (creature.attributes.destreza + creature.attributes.aura) - 2 + creature.traits.filter(t => t.name === 'Iniciativa Mejorada').length * 3, [creature.attributes, creature.traits]);
      const movementDisplay = useMemo(() => {
        const land = 9 + creature.attributes.destreza + creature.traits.filter(t => t.name === 'Velocidad Mejorada').length * 3;
        const special = new Set();
        creature.traits.forEach(t => {
          if (t.name === 'Vuelo') special.add(`Vuelo ${land}m`);
          if (t.name === 'Movimiento Especial' && t.appliedData?.movementType) special.add(`${t.appliedData.movementType} ${land}m`);
        });
        return [`${land}m`, ...Array.from(special)].join(', ');
      }, [creature.attributes.destreza, creature.traits]);

      const getEqNameWithBonus = (item, type) => item.bonus === 0 ? item[type].name : `${item[type].name} ${item.bonus > 0 ? '+' : ''}${item.bonus}`;

      const finalAttacks = useMemo(() => {
        const wa = creature.equippedWeapons.map(ew => {
          const { weapon, bonus } = ew;
          const usesDex = weapon.properties.some(p => p.name === 'Ligera');
          const attr = usesDex ? 'destreza' : 'cuerpo';
          const parts = weapon.damage.split(/([+-])/).map(s => s.trim());
          const dice = parts[0];
          const baseMod = parts.length > 1 ? parseInt(parts[1] + parts[2]) : 0;
          return { name: getEqNameWithBonus(ew, 'weapon'), type: weapon.category.includes('Dist.') ? 'Ranged' : 'Melee', attribute: attr, damageDice: dice, damageModifier: baseMod + bonus, damageType: weapon.damageType, description: weapon.properties.map(p => p.details ? `${p.name} (${p.details})` : p.name).join(', ') };
        });
        return [...wa, ...creature.attacks];
      }, [creature.equippedWeapons, creature.attacks]);

      const { vulnerabilities, resistances, immunities, statusImmunities, otherTraits } = useMemo(() => {
        const v = [], r = [], im = [], si = [];
        const oc = new Map();
        creature.traits.filter(t => !t.isCategoryAbility).forEach(trait => {
          if (trait.name === 'Vulnerable' && trait.appliedData?.damageType) v.push(trait.appliedData.damageType);
          else if (trait.name === 'Resistente' && trait.appliedData?.damageType) r.push(trait.appliedData.damageType);
          else if (trait.name === 'Inmune' && trait.appliedData?.damageType) im.push(trait.appliedData.damageType);
          else if (trait.name === 'Inmunidad a estado' && trait.appliedData?.statusEffect) si.push(trait.appliedData.statusEffect);
          else { const key = `${trait.name}|${JSON.stringify(trait.appliedData ?? {})}`; oc.has(key) ? oc.get(key).count++ : oc.set(key, { trait, count: 1 }); }
        });
        return { vulnerabilities: v, resistances: r, immunities: im, statusImmunities: si, otherTraits: Array.from(oc.values()) };
      }, [creature.traits]);

      const copyToClipboard = (text) => {
        try { navigator.clipboard.writeText(text).then(() => { setCopyText('¡Copiado!'); setTimeout(() => setCopyText('Exportar Texto'), 2000); }); }
        catch { const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); setCopyText('¡Copiado!'); setTimeout(() => setCopyText('Exportar Texto'), 2000); }
      };

      const handleConfirmExport = (options) => {
        const equipList = [...creature.equippedWeapons.map(w => getEqNameWithBonus(w, 'weapon')), creature.equippedArmor ? getEqNameWithBonus(creature.equippedArmor, 'armor') : null, creature.equippedShield ? getEqNameWithBonus(creature.equippedShield, 'shield') : null].filter(Boolean).join(', ');
        let txt = '';
        if (options.format === 'simple') {
          txt += `${creature.name.toUpperCase()} (ND ${creature.nd})\n`;
          txt += `Res: ${finalResistencia}, Def: ${finalDefensa}, Ini: ${finalIniciativa >= 0 ? '+' : ''}${finalIniciativa}, Mov: ${movementDisplay}\n`;
          txt += `Cuerpo: ${creature.attributes.cuerpo > 0 ? '+' : ''}${creature.attributes.cuerpo}, Destreza: ${creature.attributes.destreza > 0 ? '+' : ''}${creature.attributes.destreza}, Aura: ${creature.attributes.aura > 0 ? '+' : ''}${creature.attributes.aura}\n`;
          if (options.includeAttacks && finalAttacks.length > 0) {
            const at = finalAttacks.map(a => { const ab = creature.attributes[a.attribute]; const tm = ab + a.damageModifier; const ms = tm === 0 ? '' : tm > 0 ? ` + ${tm}` : ` - ${Math.abs(tm)}`; return `${a.name} (${ab >= 0 ? '+' : ''}${ab}, ${a.damageDice}${ms} ${a.damageType})`; }).join('; ');
            txt += `Ataques: ${at}\n`;
          }
          if (options.includeTraits) { const tl = []; if (categoryTrait) tl.push(categoryTrait.name); otherTraits.forEach(({ trait, count }) => { const { displayName } = getTraitDisplayInfo(trait); tl.push(`${displayName}${count > 1 ? ` (x${count})` : ''}`); }); if (tl.length) txt += `Rasgos: ${tl.join(', ')}\n`; }
        } else {
          txt += `${creature.name.toUpperCase()}\n${creature.size} ${fullCategory} (ND ${creature.nd})\n------------------------------------\n`;
          txt += `Resistencia: ${finalResistencia}\nDefensa: ${finalDefensa}\nIniciativa: ${finalIniciativa >= 0 ? '+' : ''}${finalIniciativa}\nMovimiento: ${movementDisplay}\n`;
          if (vulnerabilities.length) txt += `Vulnerable a: ${vulnerabilities.join(', ')}\n`;
          if (resistances.length) txt += `Resistente a: ${resistances.join(', ')}\n`;
          if (immunities.length) txt += `Inmune a: ${immunities.join(', ')}\n`;
          if (statusImmunities.length) txt += `Inmune a Estados: ${statusImmunities.join(', ')}\n`;
          if (equipList) txt += `Equipo: ${equipList}\n`;
          txt += `Naturaleza: ${allNatures.join(', ')}.\n------------------------------------\n`;
          txt += `Cuerpo: ${creature.attributes.cuerpo > 0 ? '+' : ''}${creature.attributes.cuerpo} | Destreza: ${creature.attributes.destreza > 0 ? '+' : ''}${creature.attributes.destreza} | Aura: ${creature.attributes.aura > 0 ? '+' : ''}${creature.attributes.aura}\n`;
          if (options.includeAttacks && finalAttacks.length) {
            txt += `------------------------------------\nACCIONES\n`;
            finalAttacks.forEach(a => { const ab = creature.attributes[a.attribute]; const tm = ab + a.damageModifier; const ms = tm === 0 ? '' : tm > 0 ? ` + ${tm}` : ` - ${Math.abs(tm)}`; txt += `* ${a.name}. Ataque de ${a.type}: ${ab >= 0 ? '+' : ''}${ab} a golpear. Impacto: ${a.damageDice}${ms} de daño ${a.damageType}.\n`; if (a.description) txt += `  ${a.description}\n`; });
          }
          if (options.includeTraits && (categoryTrait || otherTraits.length)) {
            txt += `------------------------------------\nRASGOS E HABILIDADES\n`;
            if (categoryTrait) txt += `* ${categoryTrait.name}. ${categoryTrait.description}\n`;
            otherTraits.forEach(({ trait, count }) => { const { displayName, displayDescription } = getTraitDisplayInfo(trait); let fn = displayName; if (count > 1) { const m = displayName.match(/\(([^)]+)\)/); fn = m ? displayName.replace(m[0], `(${m[1]} x${count})`) : `${displayName} (x${count})`; } txt += `* ${fn}. ${displayDescription}\n`; });
          }
        }
        copyToClipboard(txt.trim());
        setExportOpen(false);
      };

      const handleExportImage = async () => {
        if (!sheetRef.current || typeof window.html2canvas === 'undefined') { setImgText('Error'); setTimeout(() => setImgText('Exportar Imagen'), 2000); return; }
        setImgText('Generando...');
        try {
          const canvas = await window.html2canvas(sheetRef.current, { backgroundColor: '#0c0a09', scale: 2 });
          const link = document.createElement('a');
          link.download = `${creature.name.toLowerCase().replace(/\s+/g,'-')}-sheet.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();
          setImgText('¡Descargado!');
        } catch { setImgText('Error'); }
        finally { setTimeout(() => setImgText('Exportar Imagen'), 2000); }
      };

      const equipList = [...creature.equippedWeapons.map(w => getEqNameWithBonus(w, 'weapon')), creature.equippedArmor ? getEqNameWithBonus(creature.equippedArmor, 'armor') : null, creature.equippedShield ? getEqNameWithBonus(creature.equippedShield, 'shield') : null].filter(Boolean).join(', ');

      const fmtBonus = (n) => (n >= 0 ? `+${n}` : `${n}`);

      return (
        <>
          <ExportOptionsModal isOpen={exportOpen} onClose={() => setExportOpen(false)} onConfirm={handleConfirmExport}/>
          <div ref={sheetRef} className="bg-stone-950 font-body text-stone-300 rounded-lg border-2 border-stone-700 shadow-2xl overflow-hidden">
            {/* Header */}
            <div className="p-6 bg-gradient-to-r from-stone-900 via-stone-800 to-stone-900 border-b-2 border-amber-900/50">
              <div className="flex justify-between items-start">
                <div>
                  <h2 className="text-4xl font-bold text-amber-400 tracking-wider font-display">{creature.name}</h2>
                  <p className="text-stone-400 italic text-base mt-1">{creature.size} {fullCategory}</p>
                </div>
                <div className="text-center flex-shrink-0 ml-4 bg-stone-950/50 rounded-lg px-4 py-2 border border-stone-700">
                  <div className="text-xs font-bold text-stone-400 tracking-widest">ND</div>
                  <div className="text-3xl font-bold text-amber-500 font-display">{creature.nd}</div>
                </div>
              </div>
            </div>
            <div className="flex flex-col md:flex-row">
              {/* Left column */}
              <div className="w-full md:w-1/3 bg-stone-900/40 p-5 md:border-r-2 md:border-stone-700/50">
                <div className="space-y-5">
                  <div className="grid grid-cols-2 gap-3 text-center">
                    {[['RESISTENCIA', finalResistencia, 'text-red-400'],['DEFENSA', finalDefensa, 'text-sky-400']].map(([lbl, val, cls]) => (
                      <div key={lbl} className="bg-stone-800/60 rounded-lg p-3">
                        <div className="text-xs font-bold text-stone-400 tracking-widest mb-1">{lbl}</div>
                        <div className={`text-5xl font-bold ${cls} font-display`}>{val}</div>
                      </div>
                    ))}
                  </div>
                  <div className="text-center bg-stone-800/60 rounded-lg p-3">
                    <div className="text-xs font-bold text-stone-400 tracking-widest mb-1">NATURALEZA</div>
                    <div className="text-base font-bold text-stone-100 capitalize">{allNatures.join(', ')}</div>
                  </div>
                  <hr className="border-stone-700"/>
                  <div className="space-y-2">
                    {[['CUERPO', creature.attributes.cuerpo], ['DESTREZA', creature.attributes.destreza], ['AURA', creature.attributes.aura]].map(([lbl, val]) => (
                      <div key={lbl} className="flex justify-between items-center bg-stone-800 px-4 py-2 rounded-md">
                        <span className="text-sm font-bold text-stone-400 tracking-wide">{lbl}</span>
                        <span className="text-xl font-bold text-stone-100 font-mono">{fmtBonus(val)}</span>
                      </div>
                    ))}
                  </div>
                  <hr className="border-stone-700"/>
                  <div className="space-y-1 text-sm">
                    <div className="flex justify-between"><span className="text-stone-400">Iniciativa</span><span className="font-bold text-amber-400 font-mono">{fmtBonus(finalIniciativa)}</span></div>
                    <div className="flex justify-between"><span className="text-stone-400">Movimiento</span><span className="font-bold text-lime-400 text-xs text-right max-w-28">{movementDisplay}</span></div>
                    {vulnerabilities.length > 0 && <div className="flex justify-between"><span className="text-stone-400">Vulnerable</span><span className="font-semibold text-red-400 text-xs text-right">{vulnerabilities.join(', ')}</span></div>}
                    {resistances.length > 0 && <div className="flex justify-between"><span className="text-stone-400">Resistente</span><span className="font-semibold text-sky-300 text-xs text-right">{resistances.join(', ')}</span></div>}
                    {immunities.length > 0 && <div className="flex justify-between"><span className="text-stone-400">Inmune</span><span className="font-semibold text-amber-300 text-xs text-right">{immunities.join(', ')}</span></div>}
                    {statusImmunities.length > 0 && <div className="flex justify-between"><span className="text-stone-400">Inmune Estados</span><span className="font-semibold text-purple-300 text-xs text-right">{statusImmunities.join(', ')}</span></div>}
                    {equipList && <div className="pt-1"><span className="text-stone-400">Equipo: </span><span className="text-stone-200 text-xs">{equipList}</span></div>}
                  </div>
                </div>
              </div>
              {/* Right column */}
              <div className="w-full md:w-2/3 p-5">
                <div className="space-y-6">
                  <div>
                    <h3 className="text-xl font-semibold text-amber-500 mb-3 pb-1 border-b border-stone-700 font-display tracking-wider">Acciones</h3>
                    {finalAttacks.length > 0 ? (
                      <ul className="space-y-3">
                        {finalAttacks.map((attack, i) => {
                          const ab = creature.attributes[attack.attribute] || 0;
                          const tm = ab + attack.damageModifier;
                          const ms = tm === 0 ? '' : tm > 0 ? ` + ${tm}` : ` - ${Math.abs(tm)}`;
                          return (
                            <li key={i} className="bg-stone-800/40 p-3 rounded-md border-l-4 border-stone-600">
                              <p><strong className="font-bold text-amber-400">{attack.name}.</strong> <em className="text-stone-500 text-sm">({attack.type})</em></p>
                              <p className="pl-2 mt-0.5 text-sm">
                                <span className="font-mono font-bold text-lg text-stone-100">{fmtBonus(ab)}</span>
                                <span className="text-stone-400 ml-2">a golpear, Impacto: {attack.damageDice}{ms} {attack.damageType}.</span>
                              </p>
                              {attack.description && <p className="pl-2 mt-1 text-xs text-stone-400">{attack.description}</p>}
                            </li>
                          );
                        })}
                      </ul>
                    ) : <p className="text-stone-500 italic text-sm">No hay acciones de ataque definidas.</p>}
                  </div>
                  <div>
                    <h3 className="text-xl font-semibold text-amber-500 mb-3 pb-1 border-b border-stone-700 font-display tracking-wider">Rasgos y Habilidades</h3>
                    <ul className="space-y-1 text-sm list-inside">
                      {!categoryTrait && otherTraits.length === 0 && <p className="text-stone-500 italic">Ningún rasgo añadido.</p>}
                      {categoryTrait && <TraitItem trait={categoryTrait} count={1} />}
                      {otherTraits.map(({ trait, count }) => <TraitItem key={trait.instanceId} trait={trait} count={count} />)}
                    </ul>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div className="mt-6 flex justify-center gap-4">
            <button onClick={() => setExportOpen(true)} className="px-8 py-2.5 bg-lime-800 hover:bg-lime-700 text-stone-100 font-semibold rounded-lg shadow transition-all">{copyText}</button>
            <button onClick={handleExportImage} className="px-8 py-2.5 bg-sky-800 hover:bg-sky-700 text-stone-100 font-semibold rounded-lg shadow transition-all">{imgText}</button>
          </div>
        </>
      );
    };

    // ============================================================
    // MAIN APP
    // ============================================================
    const App = () => {
      const createCategoryTrait = useCallback((categoryKey, abilityIndex = 0, customAbility = null) => {
        const cat = CATEGORY_MAP[categoryKey];
        const ability = customAbility || cat.abilities[abilityIndex] || cat.abilities[0];
        return { name: ability.name, description: ability.description, cost: 0, category: 'Control y Únicos', isCategoryAbility: true, restriction: null, instanceId: `category-${categoryKey}` };
      }, []);

      const getInitialCreature = useCallback(() => ({
        name: 'Nueva Criatura', label: '', nd: '1', size: 'Mediano', category: 'Bestia',
        categoryAbilityIndex: 0, categoryCustomAbility: null,
        attributes: { cuerpo: 2, destreza: 2, aura: 2 },
        traits: [createCategoryTrait('Bestia', 0, null)],
        attacks: [{ name: 'Golpe', type: 'Melee', attribute: 'cuerpo', damageDice: '1d6', damageModifier: 0, damageType: 'Contundente', description: '' }],
        natures: ['Brutalmente'],
        equippedWeapons: [],
      }), [createCategoryTrait]);

      const [creature, setCreature] = useState(getInitialCreature);
      const [step, setStep] = useState(1);
      const [savedCreatures, setSavedCreatures] = useState([]);

      useEffect(() => {
        try { const s = localStorage.getItem('pp2-creature-saves'); if (s) setSavedCreatures(JSON.parse(s)); } catch {}
      }, []);

      const updateSaved = (list) => { setSavedCreatures(list); try { localStorage.setItem('pp2-creature-saves', JSON.stringify(list)); } catch {} };

      const handleSave = () => setCreature(c => {
        const toSave = { ...c };
        let newList;
        if (toSave.id) newList = savedCreatures.map(sc => sc.id === toSave.id ? toSave : sc);
        else { toSave.id = generateUniqueId('creature'); newList = [...savedCreatures, toSave]; }
        updateSaved(newList);
        return toSave;
      });

      const handleLoad = (id) => { const c = savedCreatures.find(c => c.id === id); if (c) { setCreature(c); setStep(6); } };
      const handleDelete = (id) => { updateSaved(savedCreatures.filter(c => c.id !== id)); if (creature.id === id) { setCreature(getInitialCreature()); setStep(1); } };
      const handleNew = () => { setCreature(getInitialCreature()); setStep(1); };

      const handleReset = () => setCreature(c => {
        const defaults = ND_MAP[c.nd];
        const catTrait = c.traits.find(t => t.isCategoryAbility);
        return { ...c, attributes: { cuerpo: defaults.bonoBase, destreza: defaults.bonoBase, aura: defaults.bonoBase }, traits: catTrait ? [catTrait] : [] };
      });

      const handleCreatureChange = (key, value) => setCreature(prev => {
        const next = { ...prev, [key]: value };
        if (key === 'nd') { const s = ND_MAP[value]; next.attributes = { cuerpo: s.bonoBase, destreza: s.bonoBase, aura: s.bonoBase }; next.traits = prev.traits.filter(t => t.name !== 'Mejora de Atributo' && t.name !== 'Deficiencia de Atributo'); }
        if (key === 'category') { next.categoryAbilityIndex = 0; next.categoryCustomAbility = null; const newCat = createCategoryTrait(value, 0, null); next.traits = [...prev.traits.filter(t => !t.isCategoryAbility), newCat]; }
        return next;
      });

      const handleAttrChange = (attr, delta) => setCreature(prev => {
        const newVal = prev.attributes[attr] + delta;
        if (newVal < -3) return prev;
        const mejora = ALL_TRAITS.find(t => t.name === 'Mejora de Atributo');
        const defic = ALL_TRAITS.find(t => t.name === 'Deficiencia de Atributo');
        if (!mejora || !defic) return prev;
        const newCreature = { ...prev, attributes: { ...prev.attributes }, traits: [...prev.traits] };
        if (delta === 1) {
          const di = newCreature.traits.findIndex(t => t.name === 'Deficiencia de Atributo' && t.appliedData?.attribute === attr);
          if (di > -1) newCreature.traits.splice(di, 1);
          else newCreature.traits.push({ ...mejora, appliedData: { attribute: attr }, instanceId: generateUniqueId('trait') });
        } else {
          const mi = newCreature.traits.findIndex(t => t.name === 'Mejora de Atributo' && t.appliedData?.attribute === attr);
          if (mi > -1) newCreature.traits.splice(mi, 1);
          else newCreature.traits.push({ ...defic, appliedData: { attribute: attr }, instanceId: generateUniqueId('trait') });
        }
        newCreature.attributes[attr] = newVal;
        if (attr === 'cuerpo') {
          if (newCreature.equippedArmor && newVal < newCreature.equippedArmor.armor.cuerpoRequirement) newCreature.equippedArmor = undefined;
          if (newCreature.equippedShield && newVal < newCreature.equippedShield.shield.cuerpoRequirement) newCreature.equippedShield = undefined;
        }
        return newCreature;
      });

      const handleAddWeapon = (name) => { const w = WEAPON_MAP[name]; if (w) setCreature(p => ({ ...p, equippedWeapons: [...p.equippedWeapons, { weapon: w, bonus: 0 }] })); };
      const handleRemoveWeapon = (i) => setCreature(p => ({ ...p, equippedWeapons: p.equippedWeapons.filter((_, idx) => idx !== i) }));
      const handleWeaponBonus = (i, bonus) => setCreature(p => { const w = [...p.equippedWeapons]; w[i] = { ...w[i], bonus }; return { ...p, equippedWeapons: w }; });
      const handleArmorShield = (type, name) => setCreature(p => {
        const nc = { ...p };
        if (name === 'Ninguno') { if (type === 'armor') nc.equippedArmor = undefined; else nc.equippedShield = undefined; }
        else { if (type === 'armor') nc.equippedArmor = { armor: ARMOR_MAP[name], bonus: 0 }; else nc.equippedShield = { shield: SHIELD_MAP[name], bonus: 0 }; }
        return nc;
      });
      const handleEquipBonus = (type, bonus) => setCreature(p => {
        if (type === 'armor' && p.equippedArmor) return { ...p, equippedArmor: { ...p.equippedArmor, bonus } };
        if (type === 'shield' && p.equippedShield) return { ...p, equippedShield: { ...p.equippedShield, bonus } };
        return p;
      });

      const addTrait = (trait) => setCreature(p => ({ ...p, traits: [...p.traits, { ...trait, instanceId: generateUniqueId('trait') }] }));
      const removeTrait = (instanceId) => setCreature(p => ({ ...p, traits: p.traits.filter(t => t.instanceId !== instanceId) }));
      const addAttack = (attack) => setCreature(p => ({ ...p, attacks: [...p.attacks, attack] }));
      const removeAttack = (i) => setCreature(p => ({ ...p, attacks: p.attacks.filter((_, idx) => idx !== i) }));
      const reorderAttacks = (from, to) => setCreature(p => { const a = [...p.attacks]; const [item] = a.splice(from, 1); a.splice(to, 0, item); return { ...p, attacks: a }; });

      const inputCls = "w-full bg-stone-700 border border-stone-600 rounded-md py-2 px-3 text-stone-100 text-sm focus:outline-none focus:ring-2 focus:ring-amber-600";
      const labelCls = "block text-sm font-medium text-stone-300 mb-1";

      const renderStep = () => {
        switch (step) {
          case 1: return (
            <div className="space-y-6 animate-fade-in">
              <h2 className="text-2xl font-bold text-amber-500 font-display">Paso 1: Concepto y Nivel de Desafío</h2>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div><label className={labelCls}>Nombre de la Criatura</label><input type="text" value={creature.name} onChange={e => handleCreatureChange('name', e.target.value)} className={inputCls}/></div>
                <div><label className={labelCls}>Nivel de Desafío (ND)</label>
                  <select value={creature.nd} onChange={e => handleCreatureChange('nd', e.target.value)} className={inputCls}>
                    {CHALLENGE_RATINGS.map(cr => <option key={cr.nd} value={cr.nd}>{cr.nd}</option>)}
                  </select>
                </div>
                <div><label className={labelCls}>Tamaño</label>
                  <select value={creature.size} onChange={e => handleCreatureChange('size', e.target.value)} className={inputCls}>
                    {SIZES.map(s => <option key={s.name} value={s.name}>{s.name}</option>)}
                  </select>
                </div>
                <div><label className={labelCls}>Naturaleza Inicial</label>
                  <select value={creature.natures[0]} onChange={e => handleCreatureChange('natures', [e.target.value])} className={inputCls}>
                    {NATURES.map(n => <option key={n} value={n}>{n}</option>)}
                  </select>
                </div>
                <div><label className={labelCls}>Categoría</label>
                  <select value={creature.category} onChange={e => handleCreatureChange('category', e.target.value)} className={inputCls}>
                    {CATEGORIES.map(c => <option key={c.name} value={c.name}>{c.name}</option>)}
                  </select>
                </div>
                <div><label className={labelCls}>Etiqueta <span className="text-xs text-stone-500">(Opcional)</span></label>
                  <input type="text" value={creature.label || ''} onChange={e => handleCreatureChange('label', e.target.value)} placeholder="Ej: No-Muerto, Golem..." className={inputCls}/>
                </div>
              </div>
              {/* Selector de Habilidad de Categoría */}
              <div className="p-4 bg-stone-900/50 rounded-lg border border-amber-900/40 space-y-3">
                <h3 className="font-semibold text-amber-400 font-display">Habilidad de Categoría: {creature.category}</h3>
                <p className="text-xs text-stone-500">Elige una de las tres opciones o escribe la tuya propia.</p>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-2">
                  {CATEGORY_MAP[creature.category].abilities.map((ab, idx) => {
                    const isSelected = !creature.categoryCustomAbility && creature.categoryAbilityIndex === idx;
                    return (
                      <button key={idx} onClick={() => {
                        const newTrait = createCategoryTrait(creature.category, idx, null);
                        setCreature(c => ({ ...c, categoryAbilityIndex: idx, categoryCustomAbility: null, traits: [...c.traits.filter(t => !t.isCategoryAbility), newTrait] }));
                      }} className={`text-left p-3 rounded-lg border transition-all ${isSelected ? 'border-amber-500 bg-amber-900/30 text-amber-200' : 'border-stone-700 bg-stone-900 text-stone-300 hover:border-amber-700'}`}>
                        <div className="font-semibold text-sm mb-1">{ab.name}</div>
                        <div className="text-xs text-stone-400 leading-snug">{ab.description}</div>
                      </button>
                    );
                  })}
                </div>
                {/* Opción personalizada */}
                <div className="pt-1">
                  <button onClick={() => {
                    if (!creature.categoryCustomAbility) {
                      setCreature(c => ({ ...c, categoryCustomAbility: { name: '', description: '' }, categoryAbilityIndex: -1 }));
                    }
                  }} className={`text-xs px-3 py-1 rounded border transition-all ${creature.categoryCustomAbility ? 'border-amber-500 text-amber-400' : 'border-stone-600 text-stone-400 hover:border-amber-700 hover:text-amber-400'}`}>
                    {creature.categoryCustomAbility ? '✎ Editando habilidad personalizada' : '+ Escribir habilidad propia'}
                  </button>
                  {creature.categoryCustomAbility && (
                    <div className="mt-2 space-y-2">
                      <input type="text" placeholder="Nombre de la habilidad..." value={creature.categoryCustomAbility.name}
                        onChange={e => {
                          const updated = { ...creature.categoryCustomAbility, name: e.target.value };
                          const newTrait = createCategoryTrait(creature.category, -1, updated);
                          setCreature(c => ({ ...c, categoryCustomAbility: updated, traits: [...c.traits.filter(t => !t.isCategoryAbility), newTrait] }));
                        }} className="w-full bg-stone-800 border border-stone-600 rounded px-3 py-1.5 text-sm text-stone-200 focus:border-amber-500 focus:outline-none"/>
                      <textarea placeholder="Descripción del efecto..." value={creature.categoryCustomAbility.description} rows={2}
                        onChange={e => {
                          const updated = { ...creature.categoryCustomAbility, description: e.target.value };
                          const newTrait = createCategoryTrait(creature.category, -1, updated);
                          setCreature(c => ({ ...c, categoryCustomAbility: updated, traits: [...c.traits.filter(t => !t.isCategoryAbility), newTrait] }));
                        }} className="w-full bg-stone-800 border border-stone-600 rounded px-3 py-1.5 text-sm text-stone-200 focus:border-amber-500 focus:outline-none resize-none"/>
                      <button onClick={() => {
                        const newTrait = createCategoryTrait(creature.category, 0, null);
                        setCreature(c => ({ ...c, categoryCustomAbility: null, categoryAbilityIndex: 0, traits: [...c.traits.filter(t => !t.isCategoryAbility), newTrait] }));
                      }} className="text-xs text-stone-500 hover:text-red-400 transition-colors">✕ Cancelar personalizada</button>
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
          case 2: return (
            <div className="animate-fade-in">
              <h2 className="text-2xl font-bold text-amber-500 mb-6 font-display">Paso 2: Atributos</h2>
              <AttributeEditor creature={creature} onAttributeChange={handleAttrChange} onReset={handleReset}/>
            </div>
          );
          case 3: return (
            <div className="animate-fade-in">
              <h2 className="text-2xl font-bold text-amber-500 mb-6 font-display">Paso 3: Personalización (Rasgos)</h2>
              <TraitSelector creature={creature} addTrait={addTrait} removeTrait={removeTrait}/>
            </div>
          );
          case 4: return (
            <div className="animate-fade-in">
              <h2 className="text-2xl font-bold text-amber-500 mb-6 font-display">Paso 4: Equipamiento</h2>
              <EquipmentSelector creature={creature} onAddWeapon={handleAddWeapon} onRemoveWeapon={handleRemoveWeapon} onWeaponBonusChange={handleWeaponBonus} onArmorShieldChange={handleArmorShield} onEquipmentBonusChange={handleEquipBonus}/>
            </div>
          );
          case 5: return (
            <div className="animate-fade-in">
              <h2 className="text-2xl font-bold text-amber-500 mb-6 font-display">Paso 5: Ataques y Acciones</h2>
              <ActionEditor creature={creature} addAttack={addAttack} removeAttack={removeAttack} reorderAttacks={reorderAttacks}/>
            </div>
          );
          case 6: return (
            <div className="animate-fade-in">
              <h2 className="text-2xl font-bold text-amber-500 mb-6 font-display">Ficha de Criatura Completa</h2>
              <CreatureSheet creature={creature}/>
            </div>
          );
        }
      };

      return (
        <div className="container mx-auto p-4 md:p-8 max-w-6xl">
          {/* Header */}
          <header className="text-center mb-8">
            <div className="inline-block">
              <h1 className="text-4xl md:text-5xl font-bold text-stone-100 font-display tracking-wide">
                Creador de Criaturas <span className="text-amber-500">PP2</span>
              </h1>
              <div className="flex items-center justify-center gap-2 mt-2">
                <div className="h-px flex-1 bg-gradient-to-r from-transparent to-amber-900/60"></div>
                <p className="text-stone-400 text-sm px-3">Una herramienta para dar vida a tus adversarios</p>
                <div className="h-px flex-1 bg-gradient-to-l from-transparent to-amber-900/60"></div>
              </div>
            </div>
          </header>

          {/* Save/Load */}
          <div className="flex justify-center mb-6">
            <SaveLoadManager creature={creature} savedCreatures={savedCreatures} onSave={handleSave} onLoad={handleLoad} onDelete={handleDelete} onNew={handleNew}/>
          </div>

          {/* Step Navigator */}
          <StepNavigator currentStep={step} onStepClick={setStep}/>

          {/* Main Content */}
          <div className="bg-stone-800/80 border border-stone-700 rounded-xl shadow-2xl p-5 md:p-8 min-h-96 backdrop-blur-sm">
            {renderStep()}
          </div>

          {/* Navigation Buttons */}
          <footer className="mt-6 flex justify-between items-center">
            <button onClick={() => setStep(s => Math.max(1, s-1))} disabled={step === 1}
              className="px-6 py-2.5 bg-stone-700 hover:bg-stone-600 text-stone-100 font-semibold rounded-lg shadow disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
              ← Anterior
            </button>
            {step === 6
              ? <button onClick={handleNew} className="px-6 py-2.5 bg-amber-700 hover:bg-amber-600 text-stone-100 font-semibold rounded-lg shadow transition-colors">Empezar de Nuevo</button>
              : <button onClick={() => setStep(s => Math.min(6, s+1))} className="px-6 py-2.5 bg-amber-700 hover:bg-amber-600 text-stone-100 font-semibold rounded-lg shadow transition-colors">Siguiente →</button>
            }
          </footer>

          <p className="text-center text-stone-600 text-xs mt-6">Las criaturas se guardan automáticamente en este navegador.</p>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
